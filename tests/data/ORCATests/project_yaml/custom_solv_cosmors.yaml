# ORCA project settings with openCOSMO-RS and custom %cosmors parameters
# All custom parameters go into the %cosmors block via custom_solvent.
gas:
  functional: m062x
  basis: def2-svp
  defgrid: DEFGRID3
solv:
  functional: m062x
  basis: def2-tzvp
  defgrid: DEFGRID3
  freq: False
  solvent_model: cosmors
  solvent_id: water
  custom_solvent: |
    aeff              5.925
    lnalpha           0.202
    lnchb             0.166
    temp              298.15
    dftfunc           "BP86"
    dftbas            "def2-TZVPD"
    solvent           "water"
